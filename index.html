<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vibe Beat Maker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  .bg-glow {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 12px;
  }

  header {
    text-align: center;
    margin-bottom: 16px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #a78bfa, #6d28d9, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }

  header p {
    color: #6b7280;
    margin-top: 4px;
    font-size: 0.85rem;
  }

  /* --- Визуализатор --- */
  .visualizer-wrap {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 16px;
  }

  canvas#visualizer {
    width: 100%;
    height: 90px;
    display: block;
    border-radius: 10px;
  }

  /* --- Контролы --- */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .btn {
    border: none;
    cursor: pointer;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    -webkit-user-select: none;
    user-select: none;
  }

  .btn:active { transform: scale(0.95); }

  .btn-play {
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    color: #fff;
    padding: 12px 24px;
    font-size: 1rem;
    box-shadow: 0 0 20px rgba(124,58,237,0.3);
  }

  .btn-play:hover { box-shadow: 0 0 30px rgba(124,58,237,0.5); }
  .btn-play.playing {
    background: linear-gradient(135deg, #dc2626, #f87171);
    box-shadow: 0 0 20px rgba(220,38,38,0.3);
  }

  .btn-clear {
    background: rgba(255,255,255,0.06);
    color: #9ca3af;
    padding: 12px 18px;
    font-size: 0.9rem;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .btn-clear:hover { background: rgba(255,255,255,0.1); color: #e0e0e0; }

  .tempo-control {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .tempo-control label {
    font-size: 0.8rem;
    color: #6b7280;
    font-weight: 600;
  }

  .tempo-control span {
    font-size: 1rem;
    font-weight: 700;
    color: #a78bfa;
    min-width: 40px;
    text-align: center;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
    outline: none;
    width: 100px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #7c3aed;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(124,58,237,0.5);
  }

  /* --- Секвенсор --- */
  .sequencer-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
    padding: 14px;
    scrollbar-width: thin;
    scrollbar-color: rgba(124,58,237,0.3) transparent;
  }

  .sequencer-wrapper::-webkit-scrollbar { height: 6px; }
  .sequencer-wrapper::-webkit-scrollbar-track { background: transparent; }
  .sequencer-wrapper::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 3px; }

  .sequencer {
    min-width: 640px;
  }

  .seq-row {
    display: flex;
    align-items: center;
    margin-bottom: 4px;
  }

  .seq-row:last-child { margin-bottom: 0; }

  .seq-label {
    width: 65px;
    font-size: 0.7rem;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    padding-right: 6px;
  }

  .seq-label .emoji { font-size: 1rem; }

  .seq-steps {
    display: flex;
    gap: 3px;
    flex: 1;
  }

  .step {
    flex: 1;
    aspect-ratio: 1;
    max-height: 42px;
    min-height: 28px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    min-width: 0;
  }

  .step:active { transform: scale(0.92); }

  .step.active {
    box-shadow: 0 0 10px var(--glow-color, rgba(124,58,237,0.4));
    border-color: var(--border-color, #7c3aed);
  }

  .step.current {
    outline: 2px solid #fff;
    outline-offset: -2px;
    z-index: 2;
  }

  .step.group-start { margin-left: 3px; }

  /* Цвета для инструментов */
  .row-kick .step.active   { --glow-color: rgba(239,68,68,0.5); --border-color: #ef4444; background: rgba(239,68,68,0.3); }
  .row-snare .step.active  { --glow-color: rgba(245,158,11,0.5); --border-color: #f59e0b; background: rgba(245,158,11,0.3); }
  .row-hihat .step.active  { --glow-color: rgba(34,197,94,0.5); --border-color: #22c55e; background: rgba(34,197,94,0.3); }
  .row-clap .step.active   { --glow-color: rgba(59,130,246,0.5); --border-color: #3b82f6; background: rgba(59,130,246,0.3); }
  .row-tom .step.active    { --glow-color: rgba(168,85,247,0.5); --border-color: #a855f7; background: rgba(168,85,247,0.3); }
  .row-rim .step.active    { --glow-color: rgba(236,72,153,0.5); --border-color: #ec4899; background: rgba(236,72,153,0.3); }
  .row-perc .step.active   { --glow-color: rgba(20,184,166,0.5); --border-color: #14b8a6; background: rgba(20,184,166,0.3); }
  .row-bass .step.active   { --glow-color: rgba(249,115,22,0.5); --border-color: #f97316; background: rgba(249,115,22,0.3); }

  /* --- Пресеты --- */
  .presets-section {
    margin-top: 16px;
  }

  .presets-label {
    font-size: 0.75rem;
    color: #4b5563;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-align: center;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .presets {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .preset-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: #9ca3af;
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    -webkit-user-select: none;
    user-select: none;
    white-space: nowrap;
  }

  .preset-btn:active { transform: scale(0.95); }
  .preset-btn:hover {
    background: rgba(124,58,237,0.15);
    border-color: rgba(124,58,237,0.3);
    color: #a78bfa;
  }

  .preset-btn.active-preset {
    background: rgba(124,58,237,0.2);
    border-color: rgba(124,58,237,0.5);
    color: #a78bfa;
  }

  /* --- Футер --- */
  .footer {
    text-align: center;
    margin-top: 20px;
    color: #4b5563;
    font-size: 0.75rem;
  }

  .footer span { color: #a78bfa; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .recording-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
    display: none; animation: pulse 1s infinite;
  }
  .recording-dot.active { display: block; }

  /* ==================== MOBILE ==================== */
  @media (max-width: 768px) {
    .container { padding: 14px 8px; }
    header h1 { font-size: 1.5rem; }
    header p { font-size: 0.75rem; }
    canvas#visualizer { height: 70px; }

    .controls { gap: 8px; }
    .btn-play { padding: 10px 18px; font-size: 0.9rem; }
    .btn-clear { padding: 10px 14px; font-size: 0.8rem; }
    .tempo-control { padding: 6px 10px; }
    .tempo-control label { font-size: 0.7rem; }
    .tempo-control span { font-size: 0.9rem; min-width: 32px; }
    input[type="range"] { width: 80px; }

    .sequencer-wrapper { padding: 10px 8px; }
    .sequencer { min-width: 560px; }
    .seq-label { width: 50px; font-size: 0.6rem; padding-right: 4px; }
    .seq-steps { gap: 2px; }
    .step { border-radius: 4px; max-height: 36px; }
    .step.group-start { margin-left: 2px; }

    .preset-btn { padding: 6px 10px; font-size: 0.7rem; }
    .presets { gap: 5px; }
  }

  @media (max-width: 380px) {
    header h1 { font-size: 1.3rem; }
    .controls { gap: 6px; }
    .btn-play { padding: 8px 14px; font-size: 0.85rem; }
    input[type="range"] { width: 60px; }
    .sequencer { min-width: 500px; }
    .seq-label { width: 44px; font-size: 0.55rem; }
    .seq-label .emoji { font-size: 0.85rem; }
    .step { max-height: 30px; min-height: 22px; border-radius: 3px; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
  <header>
    <h1>⚡ Vibe Beat Maker</h1>
    <p>Создай бит прямо в браузере — Vibe Coding в действии</p>
  </header>

  <div class="visualizer-wrap">
    <canvas id="visualizer"></canvas>
  </div>

  <div class="controls">
    <button class="btn btn-play" id="playBtn" onclick="togglePlay()">
      <span id="playIcon">▶</span>
      <span id="playText">Play</span>
      <div class="recording-dot" id="recDot"></div>
    </button>
    <div class="tempo-control">
      <label>BPM</label>
      <input type="range" id="bpmSlider" min="60" max="200" value="120" oninput="updateBPM(this.value)">
      <span id="bpmValue">120</span>
    </div>
    <button class="btn btn-clear" onclick="clearAll()">🗑 Clear</button>
  </div>

  <div class="sequencer-wrapper">
    <div class="sequencer" id="sequencer"></div>
  </div>

  <div class="presets-section">
    <div class="presets-label">Пресеты</div>
    <div class="presets" id="presetsContainer"></div>
  </div>

  <div class="footer">
    Сгенерировано с помощью <span>Vibe Coding</span> ✨
  </div>
</div>

<script>
// ======================== AUDIO ENGINE ========================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx, analyser, masterGain;

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.7;
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// --- Звуки ---
function playKick(t) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(30, t + 0.12);
  g.gain.setValueAtTime(1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.4);
}

function playSnare(t) {
  const bs = audioCtx.sampleRate * 0.15;
  const buf = audioCtx.createBuffer(1, bs, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bs; i++) d[i] = Math.random() * 2 - 1;
  const n = audioCtx.createBufferSource(); n.buffer = buf;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.8, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  const nf = audioCtx.createBiquadFilter(); nf.type = 'highpass'; nf.frequency.value = 1000;
  n.connect(nf); nf.connect(ng); ng.connect(masterGain);
  n.start(t); n.stop(t + 0.15);

  const o = audioCtx.createOscillator(), og = audioCtx.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(80, t + 0.08);
  og.gain.setValueAtTime(0.7, t); og.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o.connect(og); og.connect(masterGain);
  o.start(t); o.stop(t + 0.1);
}

function playHiHat(t) {
  const bs = audioCtx.sampleRate * 0.05;
  const buf = audioCtx.createBuffer(1, bs, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bs; i++) d[i] = Math.random() * 2 - 1;
  const n = audioCtx.createBufferSource(); n.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7000;
  n.connect(f); f.connect(g); g.connect(masterGain);
  n.start(t); n.stop(t + 0.05);
}

function playClap(t) {
  for (let i = 0; i < 3; i++) {
    const off = i * 0.01;
    const bs = audioCtx.sampleRate * 0.02;
    const buf = audioCtx.createBuffer(1, bs, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let j = 0; j < bs; j++) d[j] = Math.random() * 2 - 1;
    const n = audioCtx.createBufferSource(); n.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.5, t + off); g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.08);
    const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2500; f.Q.value = 3;
    n.connect(f); f.connect(g); g.connect(masterGain);
    n.start(t + off); n.stop(t + off + 0.08);
  }
  const bs2 = audioCtx.sampleRate * 0.15;
  const buf2 = audioCtx.createBuffer(1, bs2, audioCtx.sampleRate);
  const d2 = buf2.getChannelData(0);
  for (let j = 0; j < bs2; j++) d2[j] = Math.random() * 2 - 1;
  const n2 = audioCtx.createBufferSource(); n2.buffer = buf2;
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.4, t + 0.03); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  const f2 = audioCtx.createBiquadFilter(); f2.type = 'bandpass'; f2.frequency.value = 2500; f2.Q.value = 2;
  n2.connect(f2); f2.connect(g2); g2.connect(masterGain);
  n2.start(t + 0.03); n2.stop(t + 0.15);
}

function playTom(t) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(80, t + 0.15);
  g.gain.setValueAtTime(0.8, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.25);
}

function playRim(t) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(800, t);
  o.frequency.exponentialRampToValueAtTime(400, t + 0.03);
  g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.04);
}

function playPerc(t) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(1200, t);
  o.frequency.exponentialRampToValueAtTime(600, t + 0.06);
  g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.08);
}

function playBass(t) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(55, t);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 200; f.Q.value = 5;
  g.gain.setValueAtTime(0.6, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  o.connect(f); f.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.3);
}

const soundFns = {
  kick: playKick, snare: playSnare, hihat: playHiHat,
  clap: playClap, tom: playTom, rim: playRim,
  perc: playPerc, bass: playBass
};

// ======================== STATE ========================
const STEPS = 16;
const instruments = [
  { id: 'kick',  label: 'Kick',  emoji: '🔴' },
  { id: 'snare', label: 'Snare', emoji: '🟡' },
  { id: 'hihat', label: 'HiHat', emoji: '🟢' },
  { id: 'clap',  label: 'Clap',  emoji: '🔵' },
  { id: 'tom',   label: 'Tom',   emoji: '🟣' },
  { id: 'rim',   label: 'Rim',   emoji: '🩷' },
  { id: 'perc',  label: 'Perc',  emoji: '🟤' },
  { id: 'bass',  label: 'Bass',  emoji: '🟠' }
];

let grid = {};
let bpm = 120;
let isPlaying = false;
let currentStep = -1;
let schedulerTimer = null, stepInterval = null;
let nextNoteTime = 0;
const scheduleAheadTime = 0.1, lookahead = 25;

instruments.forEach(inst => grid[inst.id] = new Array(STEPS).fill(false));

// ======================== UI ========================
function buildSequencer() {
  const c = document.getElementById('sequencer');
  c.innerHTML = '';
  instruments.forEach(inst => {
    const row = document.createElement('div');
    row.className = `seq-row row-${inst.id}`;
    const lbl = document.createElement('div');
    lbl.className = 'seq-label';
    lbl.innerHTML = `<span class="emoji">${inst.emoji}</span> ${inst.label}`;
    row.appendChild(lbl);
    const sd = document.createElement('div');
    sd.className = 'seq-steps';
    for (let i = 0; i < STEPS; i++) {
      const s = document.createElement('div');
      s.className = 'step' + (i % 4 === 0 ? ' group-start' : '');
      s.dataset.inst = inst.id;
      s.dataset.step = i;
      s.addEventListener('click', () => toggleStep(inst.id, i, s));
      sd.appendChild(s);
    }
    row.appendChild(sd);
    c.appendChild(row);
  });
}

function toggleStep(instId, stepIdx, el) {
  ensureAudioCtx();
  grid[instId][stepIdx] = !grid[instId][stepIdx];
  el.classList.toggle('active');
  if (grid[instId][stepIdx]) soundFns[instId](audioCtx.currentTime);
}

function updateStepUI() {
  document.querySelectorAll('.step').forEach(el => el.classList.remove('current'));
  if (currentStep < 0) return;
  document.querySelectorAll(`.step[data-step="${currentStep}"]`).forEach(el => el.classList.add('current'));
}

// ======================== SCHEDULER ========================
function nextNote() {
  const spb = 60.0 / bpm;
  nextNoteTime += spb / 4;
  currentStep = (currentStep + 1) % STEPS;
}

function scheduleNote(sn, t) {
  instruments.forEach(inst => { if (grid[inst.id][sn]) soundFns[inst.id](t); });
}

function startPlaying() {
  ensureAudioCtx();
  isPlaying = true; currentStep = -1;
  nextNoteTime = audioCtx.currentTime;
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('playIcon').textContent = '⏸';
  document.getElementById('playText').textContent = 'Stop';
  document.getElementById('recDot').classList.add('active');

  schedulerTimer = setInterval(() => {
    while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
      scheduleNote((currentStep + 1) % STEPS, nextNoteTime);
      nextNote();
    }
  }, lookahead);

  stepInterval = setInterval(updateStepUI, 50);
}

function stopPlaying() {
  isPlaying = false;
  if (schedulerTimer) clearInterval(schedulerTimer);
  if (stepInterval) clearInterval(stepInterval);
  schedulerTimer = stepInterval = null;
  currentStep = -1;
  const btn = document.getElementById('playBtn');
  btn.classList.remove('playing');
  document.getElementById('playIcon').textContent = '▶';
  document.getElementById('playText').textContent = 'Play';
  document.getElementById('recDot').classList.remove('active');
  updateStepUI();
}

function togglePlay() { isPlaying ? stopPlaying() : startPlaying(); }
function updateBPM(v) { bpm = parseInt(v); document.getElementById('bpmValue').textContent = bpm; }
function clearAll() {
  stopPlaying();
  instruments.forEach(inst => grid[inst.id].fill(false));

function buildPresetButtons() {
  const c = document.getElementById('presetsContainer');
  c.innerHTML = '';
  Object.keys(presets).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = presets[key].name;
    btn.onclick = () => loadPreset(key);
    btn.id = `preset-${key}`;
    c.appendChild(btn);
  });
}

function loadPreset(name) {
  ensureAudioCtx();
  const p = presets[name];
  if (!p) return;
  stopPlaying();
  updateBPM(p.bpm);
  document.getElementById('bpmSlider').value = p.bpm;
  instruments.forEach(inst => {
    for (let i = 0; i < STEPS; i++) grid[inst.id][i] = !!p[inst.id][i];
  });
  instruments.forEach(inst => {
    document.querySelectorAll(`.step[data-inst="${inst.id}"]`).forEach((el, i) => {
      el.classList.toggle('active', grid[inst.id][i]);
    });
  });
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active-preset'));
  const activeBtn = document.getElementById(`preset-${name}`);
  if (activeBtn) activeBtn.classList.add('active-preset');
}

// ======================== VISUALIZER ========================
const canvas = document.getElementById('visualizer');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawVisualizer() {
  requestAnimationFrame(drawVisualizer);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0, 0, w, h);

  if (!analyser) {
    ctx.fillStyle = 'rgba(124,58,237,0.1)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(167,139,250,0.3)';
    ctx.font = '13px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('Нажмите Play ▶', w / 2, h / 2);
    return;
  }

  const bl = analyser.frequencyBinCount;
  const freq = new Uint8Array(bl);
  analyser.getByteFrequencyData(freq);

  const bars = 48;
  const bw = (w / bars) - 2;
  const step = Math.floor(bl / bars);

  for (let i = 0; i < bars; i++) {
    const val = freq[i * step];
    const bh = (val / 255) * h * 0.85;
    const x = i * (bw + 2);
    const y = h - bh;
    const hue = 260 + (i / bars) * 60;
    const sat = 70 + (val / 255) * 30;
    const light = 40 + (val / 255) * 30;
    ctx.fillStyle = `hsla(${hue},${sat}%,${light}%,0.8)`;
    ctx.beginPath();
    ctx.roundRect(x, y, bw, bh, 2);
    ctx.fill();
    ctx.fillStyle = `hsla(${hue},${sat}%,${light}%,0.12)`;
    ctx.beginPath();
    ctx.roundRect(x - 1, y - 3, bw + 2, bh + 6, 4);
    ctx.fill();
  }

  const wave = new Uint8Array(bl);
  analyser.getByteTimeDomainData(wave);
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(167,139,250,0.35)';
  ctx.lineWidth = 1.5;
  const sw = w / bl;
  let wx = 0;
  for (let i = 0; i < bl; i++) {
    const wy = (wave[i] / 128) * h / 2;
    i === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
    wx += sw;
  }
  ctx.stroke();
}
drawVisualizer();

// ======================== INIT ========================
buildSequencer();
buildPresetButtons();

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    togglePlay();
  }
});
